services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - chat-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # The browser talks to the backend directly, so this must be reachable
      # from the host, not the docker network.
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  chat-data:

  <circle cx="20" cy="29" r="4.2" fill="#ffffff" opacity="0.55"/>
  <circle cx="32" cy="29" r="4.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="44" cy="29" r="4.2" fill="#ffffff"/>
</svg>

      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="35%" stop-color="#2563eb"/>
      <stop offset="70%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Chat bubble -->
  <path d="M32 6C17.6 6 6 16.3 6 29c0 7.4 4 14 10.2 18.2L14 58l11.4-5.2c2.1.5 4.3.7 6.6.7 14.4 0 26-10.3 26-23S46.4 6 32 6z"
